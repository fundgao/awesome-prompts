# Netlify 部署配置 - Next.js 16 + pnpm
# 文档: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "pnpm build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  # pnpm 与 Next.js 兼容：允许依赖提升，避免构建时找不到模块
  PNPM_FLAGS = "--shamefully-hoist"

# Next.js 静态导出（output: export）下，redirects 需要交给 Netlify 配置
[[redirects]]
  from = "/location"
  to = "/overview"
  status = 301

[[redirects]]
  from = "/transport"
  to = "/overview"
  status = 301

[[redirects]]
  from = "/economy"
  to = "/overview"
  status = 301

[[redirects]]
  from = "/population"
  to = "/people"
  status = 301

[[redirects]]
  from = "/culture"
  to = "/people"
  status = 301

[[redirects]]
  from = "/food"
  to = "/people"
  status = 301

[[redirects]]
  from = "/customs"
  to = "/customs-faith"
  status = 301

[[redirects]]
  from = "/faith"
  to = "/customs-faith"
  status = 301

# locale 前缀版本
